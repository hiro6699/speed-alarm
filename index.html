<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>保守用車速度警報アプリ</title>

<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    padding: 20px;
    transition: background-color 0.3s ease;
    background: #1e1e1e; /* 単色の暗い背景 */
    color: white;
  }

  /* 警報中の背景（赤） */
  body.alert {
    background: #8b0000;
  }

  h2 {
    font-size: 32px;
    margin-bottom: 10px;
  }

  .speed {
    font-size: 72px;
    font-weight: bold;
    margin-top: 20px;
    letter-spacing: 2px;
    color: #00eaff;
    text-shadow: 0 0 10px #00eaff;
  }

  .status {
    font-size: 24px;
    margin-top: 10px;
    opacity: 0.8;
  }

  /* ボタン全体を少し大きく */
  button {
    font-size: 32px; /* ← 28px → 32px にUP */
    padding: 25px 50px; /* ← 少し大きく */
    margin: 15px;
    border-radius: 14px;
    border: none;
    background: #444;
    color: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    transition: transform 0.1s ease, background 0.3s ease;
  }

  button:active {
    transform: scale(0.95);
    background: #666;
  }

  /* 数値部分だけ大きく太字にする */
  .big-bold {
    font-size: 40px;
    font-weight: bold;
    display: block;
    margin-top: 5px;
  }

  /* 警報中の速度表示（赤く光る） */
  body.alert .speed {
    color: #ff4d4d;
    text-shadow: 0 0 20px #ff4d4d;
  }
</style>
</head>

<body>

<h2>保守用車速度警報アプリ</h2>

<button id="startBtn">スタート</button>

<button onclick="setLimit(10)">

  <span class="big-bold">10km/h</span>
</button>

<button onclick="setLimit(30)">
  構内制限速度
  <span class="big-bold">30km/h</span>
</button>

<div class="speed" id="speed">0.0 km/h</div>
<div class="status" id="status">待機中</div>
