<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>保守用車 速度警報アプリ</title>

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #1e1e1e;
    color: white;
    display: flex;
    flex-direction: row;
    height: 100vh;
    overflow: hidden;
    transition: background 0.3s ease;
  }

  /* 警報中の背景（赤） */
  body.alert {
    background: #8b0000;
  }

  /* 左側パネル（制限速度） */
  .left-panel {
    width: 40%;
    padding: 30px;
    box-sizing: border-box;
    background: rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    justify-content: center;
    font-size: 32px;
    line-height: 1.6;
  }

  .limit-title {
    font-size: 40px;
    margin-bottom: 20px;
    font-weight: bold;
  }

  /* 右側（速度メーター） */
  .right-panel {
    width: 60%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .speed {
    font-size: 120px;
    font-weight: bold;
    color: #00eaff;
    text-shadow: 0 0 20px #00eaff;
    margin-bottom: 20px;
  }

  body.alert .speed {
    color: #ff4d4d;
    text-shadow: 0 0 25px #ff4d4d;
  }

  .status {
    font-size: 32px;
    opacity: 0.8;
    margin-bottom: 40px;
  }

  button {
    font-size: 40px;
    padding: 25px 60px;
    border-radius: 15px;
    border: none;
    background: #444;
    color: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    transition: transform 0.1s ease, background 0.3s ease;
  }

  button:active {
    transform: scale(0.95);
    background: #666;
  }
</style>
</head>

<body>

<div class="left-panel">
  <div class="limit-title">基地内制限速度</div>
  <div>10 km/h</div>
  <br>
  <div class="limit-title">駅構内制限速度</div>
  <div>30 km/h</div>
</div>

<div class="right-panel">
  <div class="speed" id="speed">0.0 km/h</div>
  <div class="status" id="status">待機中</div>
  <button id="startBtn">START</button>
</div>

<script>
let speedLimit = 30;
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let alarmInterval = null;

let speedHistory = [];
let lastTime = null;
let lastLat = null;
let lastLon = null;

function calcDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function smoothSpeed(newSpeed) {
  speedHistory.push(newSpeed);
  if (speedHistory.length > 3) speedHistory.shift();
  return speedHistory.reduce((a,b)=>a+b,0) / speedHistory.length;
}

document.getElementById("startBtn").onclick = () => {
  audioCtx.resume();
  startGPS();
  document.getElementById("status").innerText = "GPS取得中…";
};

function playBeep() {
  const osc = audioCtx.createOscillator();
  osc.frequency.value = 1200;
  osc.connect(audioCtx.destination);
  osc.start();
  setTimeout(() => osc.stop(), 200);
}

function startAlarm() {
  if (alarmInterval) return;
  alarmInterval = setInterval(playBeep, 500);
  document.body.classList.add("alert");
}

function stopAlarm() {
  if (alarmInterval) {
    clearInterval(alarmInterval);
    alarmInterval = null;
  }
  document.body.classList.remove("alert");
}

function startGPS() {
  navigator.geolocation.watchPosition(
    (pos) => {
      const now = Date.now() / 1000;
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      let speed_km_h = 0;

      if (lastTime !== null) {
        const dt = now - lastTime;
        const dist = calcDistance(lastLat, lastLon, lat, lon);
        speed_km_h = (dist / dt) * 3.6;
      }

      lastTime = now;
      lastLat = lat;
      lastLon = lon;

      speed_km_h = smoothSpeed(speed_km_h);

      document.getElementById("speed").innerText =
        `${speed_km_h.toFixed(1)} km/h`;

      if (speed_km_h > speedLimit) {
        startAlarm();
      } else {
        stopAlarm();
      }
    },
    (err) => {
      document.getElementById("status").innerText = "GPSエラー: " + err.message;
    },
    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 5000
    }
  );
}
</script>

</body>
</html>
