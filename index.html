<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>高精度 速度警報アプリ</title>
<style>
  body { font-family: sans-serif; padding: 20px; text-align: center; }
  .speed { font-size: 48px; margin-top: 20px; }
  button {
    font-size: 28px;
    padding: 20px 40px;
    margin: 15px;
    border-radius: 12px;
  }
</style>
</head>
<body>

<h2>高精度 速度警報アプリ</h2>

<button id="startBtn">スタート</button>
<button onclick="setLimit(10)">10km/h</button>
<button onclick="setLimit(30)">30km/h</button>

<div class="speed" id="speed">速度: 0 km/h</div>
<div id="status"></div>

<script>
let speedLimit = 30;
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let alarmInterval = null;

// 移動平均用
let speedHistory = [];

// 前回位置
let lastTime = null;
let lastLat = null;
let lastLon = null;

// 距離計算（Haversine）
function calcDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// 移動平均
function smoothSpeed(newSpeed) {
  speedHistory.push(newSpeed);
  if (speedHistory.length > 5) speedHistory.shift();
  return speedHistory.reduce((a,b)=>a+b,0) / speedHistory.length;
}

document.getElementById("startBtn").onclick = () => {
  audioCtx.resume(); // iPhone音声ロック解除
  startGPS();
  document.getElementById("status").innerText = "GPS取得中…";
};

function setLimit(limit) {
  speedLimit = limit;
  document.getElementById("status").innerText = `現在の設定: ${limit} km/h`;
}

function playBeep() {
  const osc = audioCtx.createOscillator();
  osc.frequency.value = 800;
  osc.connect(audioCtx.destination);
  osc.start();
  setTimeout(() => osc.stop(), 300);
}

function startAlarm() {
  if (alarmInterval) return;
  alarmInterval = setInterval(playBeep, 1000);
}

function stopAlarm() {
  if (alarmInterval) {
    clearInterval(alarmInterval);
    alarmInterval = null;
  }
}

function startGPS() {
  navigator.geolocation.watchPosition(
    (pos) => {
      const now = Date.now() / 1000;
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      let speed_km_h = 0;

      if (lastTime !== null) {
        const dt = now - lastTime;
        const dist = calcDistance(lastLat, lastLon, lat, lon);
        speed_km_h = (dist / dt) * 3.6;
      }

      lastTime = now;
      lastLat = lat;
      lastLon = lon;

      // 移動平均で安定化
      speed_km_h = smoothSpeed(speed_km_h);

      document.getElementById("speed").innerText =
        `速度: ${speed_km_h.toFixed(1)} km/h`;

      if (speed_km_h > speedLimit) {
        startAlarm();
      } else {
        stopAlarm();
      }
    },
    (err) => {
      document.getElementById("status").innerText = "GPSエラー: " + err.message;
    },
    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 5000
    }
  );
}
</script>

</body>
</html>
