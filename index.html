<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>保守用車速度警報アプリ</title>

<style>
  body {
    margin: 0;
    padding: 40px 20px;
    font-family: "Yu Gothic", "Meiryo", sans-serif;
    background: #ffffff;
    color: #000000;
    text-align: center;
    transition: background 0.3s ease;
  }

  /* 警報中は画面全体を赤く */
  body.alert {
    background: #ff0000;
    color: #ffffff;
  }

  .title {
    font-size: 42px;
    font-weight: bold;
    margin-bottom: 40px;
  }

  .limit-block {
    font-size: 36px;
    line-height: 1.6;
    margin-bottom: 40px;
  }

  .speed {
    font-size: 80px;
    font-weight: bold;
    margin: 40px 0;
  }

  .start-btn {
    font-size: 48px;
    padding: 20px 80px;
    border-radius: 10px;
    border: 2px solid #000;
    background: #ffffff;
    color: #000;
    margin-top: 20px;
  }

  body.alert .start-btn {
    border-color: #fff;
    background: #ff6666;
    color: #fff;
  }

  .status {
    font-size: 32px;
    margin-top: 30px;
  }
</style>
</head>

<body>

<div class="title">保守用車速度警報アプリ</div>

<div class="limit-block">
  基地内制限速度<br>
  １０km/h<br><br>
  駅構内制限速度<br>
  ３０km/h
</div>

<div class="speed" id="speed">0.0km/h</div>

<button class="start-btn" id="startBtn">ＳＴＡＲＴ<br>（ＧＰＳ取得）</button>

<div class="status" id="status">GPS取得中…</div>

<script>
let speedLimit = 30;
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let alarmInterval = null;

let speedHistory = [];
let lastTime = null;
let lastLat = null;
let lastLon = null;

function calcDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function smoothSpeed(newSpeed) {
  speedHistory.push(newSpeed);
  if (speedHistory.length > 3) speedHistory.shift();
  return speedHistory.reduce((a,b)=>a+b,0) / speedHistory.length;
}

document.getElementById("startBtn").onclick = () => {
  audioCtx.resume();
  startGPS();
};

function playBeep() {
  const osc = audioCtx.createOscillator();
  osc.frequency.value = 1200;
  osc.connect(audioCtx.destination);
  osc.start();
  setTimeout(() => osc.stop(), 200);
}

function startAlarm() {
  if (alarmInterval) return;
  alarmInterval = setInterval(playBeep, 500);
  document.body.classList.add("alert");
}

function stopAlarm() {
  if (alarmInterval) {
    clearInterval(alarmInterval);
    alarmInterval = null;
  }
  document.body.classList.remove("alert");
}

function startGPS() {
  document.getElementById("status").innerText = "GPS取得中…";

  navigator.geolocation.watchPosition(
    (pos) => {
      const now = Date.now() / 1000;
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      let speed_km_h = 0;

      if (lastTime !== null) {
        const dt = now - lastTime;
        const dist = calcDistance(lastLat, lastLon, lat, lon);
        speed_km_h = (dist / dt) * 3.6;
      }

      lastTime = now;
      lastLat = lat;
      lastLon = lon;

      speed_km_h = smoothSpeed(speed_km_h);

      document.getElementById("speed").innerText =
        `${speed_km_h.toFixed(1)}km/h`;

      if (speed_km_h > speedLimit) {
        startAlarm();
      } else {
        stopAlarm();
      }
    },
    (err) => {
      document.getElementById("status").innerText = "GPSエラー: " + err.message;
    },
    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 5000
    }
  );
}
</script>

</body>
</html>
